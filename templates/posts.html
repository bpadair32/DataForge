{% extends "layout.html" %} {% block content %}

<h1>{{ post.title }}</h1>
<p>
  <small>{{ post.date }}</small>
  {{ post.content }}
</p>
<div class="share-buttons">
  <span class="share-label">Share this post:</span>
  <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ site_url }}/posts/{{ post.slug }}.html"
     target="_blank"
     rel="noopener noreferrer"
     class="share-button share-linkedin"
     aria-label="Share on LinkedIn">
    LinkedIn
  </a>
  <a href="https://news.ycombinator.com/submitlink?u={{ site_url }}/posts/{{ post.slug }}.html&t={{ post.title }}"
     target="_blank"
     rel="noopener noreferrer"
     class="share-button share-hackernews"
     aria-label="Share on Hacker News">
    Hacker News
  </a>
</div>
{% endblock %}
