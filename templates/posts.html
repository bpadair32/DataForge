{% extends "layout.html" %} {% block content %}

<h1>{{ post.title }}</h1>
<p>
  <small>{{ post.date }}</small>
  {{ post.content }}
</p>
<div class="share-buttons">
  <span class="share-label">Share this post:</span>
  <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ site_url }}/posts/{{ post.slug }}.html"
     target="_blank"
     rel="noopener noreferrer"
     class="share-button share-linkedin"
     aria-label="Share on LinkedIn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
    LinkedIn
  </a>
  <a href="https://news.ycombinator.com/submitlink?u={{ site_url }}/posts/{{ post.slug }}.html&t={{ post.title }}"
     target="_blank"
     rel="noopener noreferrer"
     class="share-button share-hackernews"
     aria-label="Share on Hacker News">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M0 0v24h24V0H0zm12.8 14.4v5.2H11v-5.2L5.6 4.4h2.2l4.1 7.6 4.1-7.6h2.2l-5.4 10z"/></svg>
    Hacker News
  </a>
  <a href="https://bsky.app/intent/compose?text={{ post.title }}%20{{ site_url }}/posts/{{ post.slug }}.html"
     target="_blank"
     rel="noopener noreferrer"
     class="share-button share-bluesky"
     aria-label="Share on Bluesky">
    <svg width="16" height="16" viewBox="0 0 568 501" fill="currentColor" aria-hidden="true"><path d="M123.121 33.664C188.241 82.553 258.281 181.68 284 234.873c25.719-53.192 95.759-152.32 160.879-201.21C491.866-1.611 568-28.906 568 57.947c0 17.346-9.945 145.713-15.778 166.555-20.275 72.453-94.155 90.933-159.875 79.748C507.222 323.8 536.444 388.56 473.333 453.32c-119.86 122.992-172.272-30.859-185.702-70.281-2.462-7.227-3.614-10.608-3.631-7.733-.017-2.875-1.169.506-3.631 7.733-13.43 39.422-65.842 193.273-185.702 70.28-63.111-64.76-33.89-129.52 80.986-149.071-65.72 11.185-139.6-7.295-159.875-79.748C9.945 203.659 0 75.291 0 57.946 0-28.906 76.135-1.612 123.121 33.664z"/></svg>
    Bluesky
  </a>
</div>
{% endblock %}
