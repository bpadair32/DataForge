<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link id="df-theme-css" href="{{ css_base }}themes/{{ default_theme }}.css" rel="stylesheet">
    <script>
      (function() {
        var saved = localStorage.getItem('df-theme');
        if (saved) {
          document.getElementById('df-theme-css').setAttribute('href',
            '{{ css_base }}themes/' + saved + '.css');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anta&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="{{ site_url }}/feed.xml">
    <title>{% block title %} {% endblock %}</title>
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1>Example</h1>
        <nav>
          <ul>
            <li><a href="index.html">Home</a></li>
            {% for page in pages -%}
              <li><a href="{{ page.slug }}.html">{{ page.title }}</a></li>
            {% endfor %}
          </ul>
          {% if show_theme_switcher %}
          <div class="theme-switcher">
            <label for="df-theme-select">Theme:</label>
            <select id="df-theme-select" aria-label="Select theme">
              {% for theme in themes %}
              <option value="{{ theme.name }}">{{ theme.label }}</option>
              {% endfor %}
            </select>
          </div>
          {% endif %}
        </nav>
      </header>
      <main>
         {% block content %}{% endblock %}
      </main>
    </div>
    {% if show_theme_switcher %}
    <script>
      (function() {
        var select = document.getElementById('df-theme-select');
        var link = document.getElementById('df-theme-css');
        if (!select || !link) return;
        var currentHref = link.getAttribute('href');
        var themesBase = currentHref.substring(0, currentHref.lastIndexOf('/') + 1);
        var saved = localStorage.getItem('df-theme');
        select.value = saved || '{{ default_theme }}';
        select.addEventListener('change', function() {
          var name = select.value;
          link.setAttribute('href', themesBase + name + '.css');
          localStorage.setItem('df-theme', name);
        });
      })();
    </script>
    {% endif %}
  </body>
</html>
